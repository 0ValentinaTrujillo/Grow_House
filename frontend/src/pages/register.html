<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow House</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/output.css"> 
    <link rel="stylesheet" href="../styles/styles.css">  
    <style>
        body{
            font-family: 'Poppins', sans-serif;
            background-image: url("../assets/images/fondo-paginacion.jpg");
            background-repeat: no-repeat;
            background-size:cover;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #2c7611, #317319, #2c7611)
        }
        .glass-effect {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
        }
        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hover-lift:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .category-hover {
            transition: all 0.4s ease;
        }
        .category-hover:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 60px rgba(147, 51, 234, 0.3);
        }
        .product-card {
            background: linear-gradient(145deg, #ffffff, #f8fafc);
            border: 1px solid rgba(147, 51, 234, 0.1);
        }
        .product-card:hover {
            border-color: rgba(147, 51, 234, 0.3);
            box-shadow: 0 20px 40px rgba(147, 51, 234, 0.15);
        }
        .price-highlight {
            color: #207939;
            font-weight: 800;
        }
        .btn-primary {
            background: linear-gradient(135deg, #207719, #46d560);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #207719, #46d560);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(4, 111, 26, 0.978);
        }

        :root {
            --color-principal: #207719; /* verde principal */
            --color-hover: #207719;    /* verde más oscuro */
        }

        .texto-verde {
            color: var(--color-principal);
        }

        .texto-verde:hover {
            color: var(--color-hover);
        }

        .bg-verde {
            background-color: var(--color-principal);
        }

        .bg-verde:hover {
            background-color: var(--color-hover);
        }
    </style>
</head>
<body>
    <header>
        <nav class="navegation mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center text-2xl font-bold">
                    <img src="../assets/images/Logo-blanco.png" alt="Logo" class="w-12 h-12 rounded-full object-cover mr-4">
                    <a href="index.html" class="text-white font-bold">Grow House</a>
                </div>
            </div>
        </nav>
    <!--CONTENIDO PRINCIPAL - FORMULARIO DE REGISTRO -->
    <main class="flex-1 flex items-center justify-center px-4 py-2" >
        <div class="w-full max-w-3xl mx-auto">
            <!-- Card principal del login -->
            <div class="bg-white rounded-2xl shadow-2xl p-6 border border-gray-100">

                <!-- Título y descripción -->
                <div class="text-center mb-8">
                    <div class="flex justify-center mb-2">
                        <svg style="width:2rem;height:2rem;color:black;" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">¡Bienvenido!</h1>
                    <p class="text-gray-600">Inicia sesión en tu cuenta de Grow House</p>
                </div>


                <!-- Formulario de Registro -->
                <form id="register-form" class="space-y-5">
                    
                    <!-- Fila 1: Nombre y Apellido (lado a lado) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        
                        <!-- Campo de Nombre -->
                        <div>
                            <label for="firstName" class="block text-sm font-medium text-gray-700 mb-1">
                                <svg class="w-4 h-4 inline mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                                Nombre
                            </label>
                            <input 
                                type="text" 
                                id="firstName" 
                                name="firstName"
                                required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-800 focus:border-green-800 transition-all duration-200 text-gray-900"
                            >
                            <p id="firstName-error" class="text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <!-- Campo de Apellido -->
                        <div>
                            <label for="lastName" class="block text-sm font-medium text-gray-700 mb-1">
                                <svg class="w-4 h-4 inline mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                                Apellido
                            </label>
                            <input 
                                type="text" 
                                id="lastName" 
                                name="lastName"
                                required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-800 focus:border-green-800 transition-all duration-200 text-gray-900"
                            >
                            <p id="lastName-error" class="text-red-500 text-sm mt-1 hidden"></p>
                        </div>
                    </div>

                    <!-- Campo de Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                            <svg class="w-4 h-4 inline mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                            </svg>
                            Correo electrónico
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-300 focus:border-purple-400 transition-all duration-200 text-gray-900">
                        <p id="email-error" class="text-red-500 text-sm mt-1 hidden"></p>
                    </div>

                    <!-- Campo de Teléfono -->
                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">
                            <svg class="w-4 h-4 inline mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                            Teléfono
                        </label>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone"
                            required
                            maxlength="10"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-800 focus:border-green-800 transition-all duration-200 text-gray-900">
                        <p id="phone-error" class="text-red-500 text-sm mt-1 hidden"></p>
                        <p class="text-xs text-gray-500 mt-1">Formato: 10 dígitos sin espacios</p>
                    </div>

                    <!-- Campo de Contraseña -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                            <svg class="w-4 h-4 inline mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                            Contraseña
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                name="password"
                                required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-800 focus:border-green-800 transition-all duration-200 pr-12 text-gray-900"  >
                            <button 
                                type="button" 
                                id="toggle-password"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                                <svg id="eye-icon-open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                                <svg id="eye-icon-closed" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                                </svg>
                            </button>
                        </div> 
                        <p id="password-error" class="text-red-500 text-sm mt-1 hidden"></p>
                        
                        <!-- Indicador de fortaleza de contraseña -->
                        <div class="mt-2" id="password-strength-container" style="display: none;">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-xs font-medium text-gray-600">Fortaleza:</span>
                                <span id="password-strength-text" class="text-xs font-semibold"></span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden">
                                <div id="password-strength-bar" class="password-strength-bar h-full" style="width: 0%"></div>
                            </div>
                            <ul class="text-xs text-gray-600 mt-2 space-y-1">
                                <li id="req-length" class="flex items-center">
                                    <span class="mr-2">○</span> Mínimo 8 caracteres
                                </li>
                                <li id="req-uppercase" class="flex items-center">
                                    <span class="mr-2">○</span> Una mayúscula
                                </li>
                                <li id="req-lowercase" class="flex items-center">
                                    <span class="mr-2">○</span> Una minúscula
                                </li>
                                <li id="req-number" class="flex items-center">
                                    <span class="mr-2">○</span> Un número
                                </li>
                            </ul>
                        </div>
                    </div> 
                    <!-- Campo de Confirmar Contraseña -->
                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">
                            <svg class="w-4 h-4 inline mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                            </svg>
                            Confirmar contraseña
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword"
                                required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-800 focus:border-green-800 transition-all duration-200 pr-12 text-gray-900"
                            >
                            <button 
                                type="button" 
                                id="toggle-confirm-password"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                            >
                                <svg id="eye-icon-open-confirm" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                                <svg id="eye-icon-closed-confirm" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                                </svg>
                            </button>
                        </div>
                        <p id="confirmPassword-error" class="text-red-500 text-sm mt-1 hidden"></p>
                    </div>
                    <br>

                    <!-- Términos y condiciones -->
                    <div class="flex items-start">
                         <input type="checkbox" id="terms"
                                style="width:1rem;height:1rem;border:1px solid #d1d5db;border-radius:0.25rem;accent-color:#175013;">
                        <style>.label{margin-left:0.5rem;font-size:0.875rem;line-height:1.25rem;color:#374151}.label a{color:#175013;font-weight:600;text-decoration:none}.label a:hover{color:#175013}</style>
                        <label class="terms-label">Acepto los <a href="#">términos y condiciones</a> y la <a href="#">política de privacidad</a></label>

                    </div>
                    <p id="terms-error" class="text-red-500 text-sm mt-1 hidden"></p>

                    <!-- Mensaje de error general -->
                    <div id="register-error" class="hidden bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <span id="register-error-message"></span>
                        </div>
                    </div>
                    <br>

                    <!-- Botón de submit -->
                    <button type="submit" id="register-btn"
                        style="width:100%;background:linear-gradient(to right,#166534,#016622);color:white;padding:0.75rem 1.5rem;border-radius:0.5rem;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 8px 12px -6px rgba(0,0,0,0.1),0 4px 6px -2px rgba(0,0,0,0.05);"
                        onmouseover="this.style.background='linear-gradient(to right,#166534,#016622)';this.style.transform='scale(1.02)';"
                        onmouseout="this.style.background='linear-gradient(to right,#166534,#016622)';this.style.transform='scale(1)';">
                        <svg style="width:1.25rem;height:1.25rem;margin-right:0.5rem;flex-shrink:0;" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                        </svg>
                        Crear Cuenta
                    </button>

                </form>

                <!-- Ya tienes cuenta -->
                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        ¿Ya tienes cuenta?
                        <a href="login.html" style="color:#175013;font-weight:600;transition:color 0.3s;"
                            onmouseover="this.style.color='#175013';" onmouseout="this.style.color='#175013';">
                            Inicia sesión aquí
                        </a>
                    </p>
                </div>

            </div>

            <!-- Info adicional -->
            <div class="mt-6 text-center text-sm text-white">
                <p>
                    <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                    Tu información está protegida y nunca será compartida
                </p>
            </div>

        </div>
    </main>
    </header>

    <!-- Auth API -->
    <script src="../scripts/auth-api.js"></script>
    <script src="../scripts/session.js"></script>

    <!-- Register Logic -->
    <script>
        console.log('📝 Inicializando register.html');

        // =============================================
        // VERIFICAR SI YA ESTÁ LOGUEADO
        // =============================================
        
        if (authAPI.isAuthenticated()) {
            console.log('✅ Usuario ya está logueado, redirigiendo...');
            showAuthNotification('Ya tienes una sesión activa', 'info');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // =============================================
        // TOGGLE PASSWORD VISIBILITY
        // =============================================
        
        const togglePasswordBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const eyeIconOpen = document.getElementById('eye-icon-open');
        const eyeIconClosed = document.getElementById('eye-icon-closed');

        togglePasswordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIconOpen.classList.add('hidden');
                eyeIconClosed.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIconOpen.classList.remove('hidden');
                eyeIconClosed.classList.add('hidden');
            }
        });

        // Toggle para confirmar contraseña
        const toggleConfirmPasswordBtn = document.getElementById('toggle-confirm-password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const eyeIconOpenConfirm = document.getElementById('eye-icon-open-confirm');
        const eyeIconClosedConfirm = document.getElementById('eye-icon-closed-confirm');

        toggleConfirmPasswordBtn.addEventListener('click', () => {
            if (confirmPasswordInput.type === 'password') {
                confirmPasswordInput.type = 'text';
                eyeIconOpenConfirm.classList.add('hidden');
                eyeIconClosedConfirm.classList.remove('hidden');
            } else {
                confirmPasswordInput.type = 'password';
                eyeIconOpenConfirm.classList.remove('hidden');
                eyeIconClosedConfirm.classList.add('hidden');
            }
        });

        // =============================================
        // INDICADOR DE FORTALEZA DE CONTRASEÑA
        // =============================================
        
        const passwordStrengthContainer = document.getElementById('password-strength-container');
        const passwordStrengthBar = document.getElementById('password-strength-bar');
        const passwordStrengthText = document.getElementById('password-strength-text');

        function checkPasswordStrength(password) {
            if (!password) {
                passwordStrengthContainer.style.display = 'none';
                return;
            }

            passwordStrengthContainer.style.display = 'block';

            let strength = 0;
            const requirements = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password)
            };

            // Actualizar checkmarks de requisitos
            document.getElementById('req-length').innerHTML = requirements.length 
                ? '<span class="mr-2 text-green-600">✓</span> Mínimo 8 caracteres'
                : '<span class="mr-2">○</span> Mínimo 8 caracteres';
            
            document.getElementById('req-uppercase').innerHTML = requirements.uppercase 
                ? '<span class="mr-2 text-green-600">✓</span> Una mayúscula'
                : '<span class="mr-2">○</span> Una mayúscula';
            
            document.getElementById('req-lowercase').innerHTML = requirements.lowercase 
                ? '<span class="mr-2 text-green-600">✓</span> Una minúscula'
                : '<span class="mr-2">○</span> Una minúscula';
            
            document.getElementById('req-number').innerHTML = requirements.number 
                ? '<span class="mr-2 text-green-600">✓</span> Un número'
                : '<span class="mr-2">○</span> Un número';

            // Calcular fortaleza
            if (requirements.length) strength++;
            if (requirements.uppercase) strength++;
            if (requirements.lowercase) strength++;
            if (requirements.number) strength++;
            if (password.length >= 12) strength++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;

            // Actualizar barra visual
            let strengthClass = '';
            let strengthLabel = '';
            let strengthWidth = '0%';

            if (strength <= 2) {
                strengthClass = 'strength-weak';
                strengthLabel = 'Débil';
                strengthWidth = '25%';
            } else if (strength === 3) {
                strengthClass = 'strength-medium';
                strengthLabel = 'Media';
                strengthWidth = '50%';
            } else if (strength === 4) {
                strengthClass = 'strength-strong';
                strengthLabel = 'Fuerte';
                strengthWidth = '75%';
            } else {
                strengthClass = 'strength-very-strong';
                strengthLabel = 'Muy Fuerte';
                strengthWidth = '100%';
            }

            passwordStrengthBar.className = 'password-strength-bar h-full ' + strengthClass;
            passwordStrengthBar.style.width = strengthWidth;
            passwordStrengthBar.style.setProperty('--progress-width', strengthWidth);
            passwordStrengthText.textContent = strengthLabel;
            passwordStrengthText.className = 'text-xs font-semibold ' + 
                (strength <= 2 ? 'text-red-600' : 
                 strength === 3 ? 'text-yellow-600' : 
                 'text-green-600');
        }

        passwordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
            if (passwordInput.classList.contains('input-error')) {
                hideFieldError('password');
            }
        });

        // =============================================
        // VALIDACIÓN EN TIEMPO REAL
        // =============================================
        
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const confirmPasswordInputValidation = document.getElementById('confirmPassword');

        // Validar nombre
        firstNameInput.addEventListener('blur', () => {
            const firstName = firstNameInput.value.trim();
            
            if (!firstName) {
                showFieldError('firstName', 'El nombre es obligatorio');
            } else if (firstName.length < 2) {
                showFieldError('firstName', 'El nombre debe tener al menos 2 caracteres');
            } else if (!/^[a-záéíóúñA-ZÁÉÍÓÚÑ\s]+$/.test(firstName)) {
                showFieldError('firstName', 'El nombre solo puede contener letras');
            } else {
                hideFieldError('firstName');
            }
        });

        firstNameInput.addEventListener('input', () => {
            if (firstNameInput.classList.contains('input-error')) {
                hideFieldError('firstName');
            }
        });

        // Validar apellido
        lastNameInput.addEventListener('blur', () => {
            const lastName = lastNameInput.value.trim();
            
            if (!lastName) {
                showFieldError('lastName', 'El apellido es obligatorio');
            } else if (lastName.length < 2) {
                showFieldError('lastName', 'El apellido debe tener al menos 2 caracteres');
            } else if (!/^[a-záéíóúñA-ZÁÉÍÓÚÑ\s]+$/.test(lastName)) {
                showFieldError('lastName', 'El apellido solo puede contener letras');
            } else {
                hideFieldError('lastName');
            }
        });

        lastNameInput.addEventListener('input', () => {
            if (lastNameInput.classList.contains('input-error')) {
                hideFieldError('lastName');
            }
        });

        // Validar email
        emailInput.addEventListener('blur', () => {
            const email = emailInput.value.trim();
            
            if (!email) {
                showFieldError('email', 'El correo es obligatorio');
            } else if (!isValidEmail(email)) {
                showFieldError('email', 'Ingresa un correo válido');
            } else {
                hideFieldError('email');
            }
        });

        emailInput.addEventListener('input', () => {
            if (emailInput.classList.contains('input-error')) {
                hideFieldError('email');
            }
        });

        // Validar teléfono
        phoneInput.addEventListener('blur', () => {
            const phone = phoneInput.value.trim();
            
            if (!phone) {
                showFieldError('phone', 'El teléfono es obligatorio');
            } else if (!/^[0-9]{10}$/.test(phone)) {
                showFieldError('phone', 'El teléfono debe tener 10 dígitos');
            } else if (!phone.startsWith('3')) {
                showFieldError('phone', 'El teléfono debe comenzar con 3 (celular colombiano)');
            } else {
                hideFieldError('phone');
            }
        });

        phoneInput.addEventListener('input', (e) => {
            // Solo permitir números
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            
            if (phoneInput.classList.contains('input-error')) {
                hideFieldError('phone');
            }
        });

        // Validar contraseña
        passwordInput.addEventListener('blur', () => {
            const password = passwordInput.value;
            
            if (!password) {
                showFieldError('password', 'La contraseña es obligatoria');
            } else if (password.length < 8) {
                showFieldError('password', 'La contraseña debe tener al menos 8 caracteres');
            } else if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
                showFieldError('password', 'Debe contener mayúscula, minúscula y número');
            } else {
                hideFieldError('password');
            }
        });

        // Validar confirmación de contraseña
        confirmPasswordInputValidation.addEventListener('blur', () => {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInputValidation.value;
            
            if (!confirmPassword) {
                showFieldError('confirmPassword', 'Debes confirmar tu contraseña');
            } else if (password !== confirmPassword) {
                showFieldError('confirmPassword', 'Las contraseñas no coinciden');
            } else {
                hideFieldError('confirmPassword');
            }
        });

        confirmPasswordInputValidation.addEventListener('input', () => {
            if (confirmPasswordInputValidation.classList.contains('input-error')) {
                // Validar en tiempo real si las contraseñas coinciden
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInputValidation.value;
                
                if (confirmPassword && password === confirmPassword) {
                    hideFieldError('confirmPassword');
                }
            }
        });

        // =============================================
        // MANEJO DEL FORMULARIO
        // =============================================
        
        const registerForm = document.getElementById('register-form');
        const registerBtn = document.getElementById('register-btn');
        const registerError = document.getElementById('register-error');
        const registerErrorMessage = document.getElementById('register-error-message');
        const terms = document.getElementById("terms");
        const accepted = terms ? terms.checked : false;


        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            console.log('📝 Procesando formulario de registro');

            // Limpiar errores previos
            hideAllErrors();

            // Obtener valores
            const firstName = firstNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            const email = emailInput.value.trim();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInputValidation.value;
            const termsCheckbox=document.getElementById('terms')
            const termsAccepted = termsCheckbox ? termsCheckbox.checked:false;

            // Validación completa
            let hasErrors = false;

            // Validar nombre
            if (!firstName) {
                showFieldError('firstName', 'El nombre es obligatorio');
                hasErrors = true;
            } else if (firstName.length < 2) {
                showFieldError('firstName', 'El nombre debe tener al menos 2 caracteres');
                hasErrors = true;
            } else if (!/^[a-záéíóúñA-ZÁÉÍÓÚÑ\s]+$/.test(firstName)) {
                showFieldError('firstName', 'El nombre solo puede contener letras');
                hasErrors = true;
            }

            // Validar apellido
            if (!lastName) {
                showFieldError('lastName', 'El apellido es obligatorio');
                hasErrors = true;
            } else if (lastName.length < 2) {
                showFieldError('lastName', 'El apellido debe tener al menos 2 caracteres');
                hasErrors = true;
            } else if (!/^[a-záéíóúñA-ZÁÉÍÓÚÑ\s]+$/.test(lastName)) {
                showFieldError('lastName', 'El apellido solo puede contener letras');
                hasErrors = true;
            }

            // Validar email
            if (!email) {
                showFieldError('email', 'El correo es obligatorio');
                hasErrors = true;
            } else if (!isValidEmail(email)) {
                showFieldError('email', 'Ingresa un correo válido');
                hasErrors = true;
            }

            // Validar teléfono
            if (!phone) {
                showFieldError('phone', 'El teléfono es obligatorio');
                hasErrors = true;
            } else if (!/^[0-9]{10}$/.test(phone)) {
                showFieldError('phone', 'El teléfono debe tener 10 dígitos');
                hasErrors = true;
            } else if (!phone.startsWith('3')) {
                showFieldError('phone', 'El teléfono debe comenzar con 3');
                hasErrors = true;
            }

            // Validar contraseña
            if (!password) {
                showFieldError('password', 'La contraseña es obligatoria');
                hasErrors = true;
            } else if (password.length < 8) {
                showFieldError('password', 'La contraseña debe tener al menos 8 caracteres');
                hasErrors = true;
            } else if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
                showFieldError('password', 'Debe contener mayúscula, minúscula y número');
                hasErrors = true;
            }

            // Validar confirmación de contraseña
            if (!confirmPassword) {
                showFieldError('confirmPassword', 'Debes confirmar tu contraseña');
                hasErrors = true;
            } else if (password !== confirmPassword) {
                showFieldError('confirmPassword', 'Las contraseñas no coinciden');
                hasErrors = true;
            }

            // Validar términos
            if (!termsAccepted) {
                showFieldError('terms', 'Debes aceptar los términos y condiciones');
                hasErrors = true;
            }

            if (hasErrors) {
                console.log('❌ Errores en el formulario');
                showGeneralError('Por favor corrige los errores antes de continuar');
                return;
            }

            // Mostrar loading en el botón
            const originalBtnText = registerBtn.innerHTML;
            registerBtn.disabled = true;
            registerBtn.innerHTML = `<svg class="w-5 h-5 inline mr-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Creando cuenta...`;

            try {
                // Preparar datos de usuario
                const userData = {
                    firstName,
                    lastName,
                    email,
                    phone,
                    password
                };

                // Llamar a la API
                const result = await authAPI.register(userData);

                if (result.success) {
                    console.log('✅ Registro exitoso');
                    
                    // Mostrar mensaje de éxito
                    showAuthNotification('¡Cuenta creada exitosamente! Bienvenido a TechStore Pro', 'success');

                    // Esperar un momento y redirigir
                    setTimeout(() => {
                        // El usuario ya está logueado automáticamente después del registro
                        window.location.href = 'index.html';
                    }, 1500);

                } else {
                    console.error('❌ Error en registro:', result.error);
                    
                    // Mostrar error específico
                    let errorMessage = result.error;
                    
                    // Personalizar mensajes de error
                    if (result.error.includes('email') || result.error.includes('correo')) {
                        showFieldError('email', 'Este correo ya está registrado');
                        errorMessage = 'El correo electrónico ya está en uso. ¿Ya tienes cuenta?';
                    }
                    
                    showGeneralError(errorMessage);

                    // Restaurar botón
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = originalBtnText;
                }

            } catch (error) {
                console.error('❌ Error inesperado:', error);
                showGeneralError('Error de conexión. Verifica tu conexión a internet.');
                
                // Restaurar botón
                registerBtn.disabled = false;
                registerBtn.innerHTML = originalBtnText;
            }
        });

        // =============================================
        // FUNCIONES AUXILIARES
        // =============================================
        
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function showFieldError(field, message) {
            const input = document.getElementById(field);
            const errorElement = document.getElementById(`${field}-error`);
            
            if (input) {
                input.classList.add('input-error', 'border-red-500', 'focus:ring-red-500');
                input.classList.remove('border-gray-300');
            }
            
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.remove('hidden');
            }
        }

        function hideFieldError(field) {
            const input = document.getElementById(field);
            const errorElement = document.getElementById(`${field}-error`);
            
            if (input) {
                input.classList.remove('input-error', 'border-red-500', 'focus:ring-red-500');
                input.classList.add('border-gray-300');
            }
            
            if (errorElement) {
                errorElement.classList.add('hidden');
            }
        }

        function showGeneralError(message) {
            registerErrorMessage.textContent = message;
            registerError.classList.remove('hidden');
            registerError.classList.add('animate-shake');
            
            // Remover animación después de que termine
            setTimeout(() => {
                registerError.classList.remove('animate-shake');
            }, 500);
            
            // Auto-ocultar después de 8 segundos
            setTimeout(() => {
                registerError.classList.add('hidden');
            }, 8000);
        }

        function hideAllErrors() {
            hideFieldError('firstName');
            hideFieldError('lastName');
            hideFieldError('email');
            hideFieldError('phone');
            hideFieldError('password');
            hideFieldError('confirmPassword');
            hideFieldError('terms');
            registerError.classList.add('hidden');
        }

        // =============================================
        // MOBILE MENU TOGGLE
        // =============================================
        
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');

        if (mobileMenuButton && mobileMenu) {
            mobileMenuButton.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        console.log('✅ register.html inicializado correctamente');
    </script>

    <!-- Fallback CSS si Tailwind no carga -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const testElement = document.createElement('div');
            testElement.className = 'bg-blue-500';
            document.body.appendChild(testElement);
            
            const computedStyle = window.getComputedStyle(testElement);
            if (computedStyle.backgroundColor === 'rgba(0, 0, 0, 0)' || computedStyle.backgroundColor === 'transparent') {
                const script = document.createElement('script');
                script.src = 'https://cdn.tailwindcss.com';
                document.head.appendChild(script);
                console.warn('CSS local no encontrado, usando Tailwind CDN');
            }
            document.body.removeChild(testElement);
        });
    </script>
    </div>
</body>
