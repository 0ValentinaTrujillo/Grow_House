<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow House | Inicio de sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/output.css"> 
    <link rel="stylesheet" href="../styles/styles.css">  
    <style>
        body{
            font-family: 'Poppins', sans-serif;
            background-image: url("../assets/images/fondo-paginacion.jpg");
            background-repeat: no-repeat;
            background-size:cover;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #2c7611, #317319, #2c7611)
        }
        .glass-effect {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
        }
        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hover-lift:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .category-hover {
            transition: all 0.4s ease;
        }
        .category-hover:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 60px rgba(147, 51, 234, 0.3);
        }
        .product-card {
            background: linear-gradient(145deg, #ffffff, #f8fafc);
            border: 1px solid rgba(147, 51, 234, 0.1);
        }
        .product-card:hover {
            border-color: rgba(147, 51, 234, 0.3);
            box-shadow: 0 20px 40px rgba(147, 51, 234, 0.15);
        }
        .price-highlight {
            color: #207939;
            font-weight: 800;
        }
        .btn-primary {
            background: linear-gradient(135deg, #207719, #46d560);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #207719, #46d560);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(4, 111, 26, 0.978);
        }

        :root {
            --color-principal: #207719; /* verde principal */
            --color-hover: #207719;    /* verde más oscuro */
        }

        .texto-verde {
            color: var(--color-principal);
        }

        .texto-verde:hover {
            color: var(--color-hover);
        }

        .bg-verde {
            background-color: var(--color-principal);
        }

        .bg-verde:hover {
            background-color: var(--color-hover);
        }
    </style>
</head>

<body>
    <header>
        <nav class="navegation mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center text-2xl font-bold">
                    <img src="../assets/images/Logo-blanco.png" alt="Logo" class="w-12 h-12 rounded-full object-cover mr-4">
                    <a href="index.html" class="text-white font-bold">Grow House</a>
                </div>
            </div>
    <!-- CONTENIDO PRINCIPAL - FORMULARIO DE LOGIN -->
    <main
        class="flex-1 flex items-center justify-center px-4 py-2" >
        <div class="w-full max-w-md animate-fade-in">

            <!-- Card principal del login -->
            <div class="bg-white rounded-2xl shadow-2xl p-6 border border-gray-100">

                <!-- Título y descripción -->
                <div class="text-center mb-8">
                    <div class="flex justify-center mb-2">
                        <svg style="width:2rem;height:2rem;color:black;" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">¡Bienvenido!</h1>
                    <p class="text-gray-600">Inicia sesión en tu cuenta de Grow House</p>
                </div>

                <!-- Formulario de Login -->
                <form id="login-form" class="space-y-4">

                    <!-- Campo de Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            <svg class="w-4 h-4 inline mr-2 text-gray-400" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                            </svg>
                            Correo electrónico
                        </label>
                        <input type="email" id="email" name="email" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-800 focus:border-green-800 transition-all duration-200 text-gray-900">
                        <p id="email-error" class="text-red-500 text-sm mt-1 hidden"></p>
                    </div>

                    <!-- Campo de Contraseña -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            <svg class="w-4 h-4 inline mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                            Contraseña
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                name="password"
                                required
                                placeholder="••••••••"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-800 focus:border-green-800 transition-all duration-200 pr-12 text-gray-900"
                            >
                            <button 
                                type="button" 
                                id="toggle-password"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                            >
                                <svg id="eye-icon-open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                                <svg id="eye-icon-closed" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                                </svg>
                            </button>
                        </div>
                        <p id="password-error" class="text-red-500 text-sm mt-1 hidden"></p>
                    </div>

                    <!-- Recordar sesión y olvidé contraseña -->
                    <div style="display:flex;align-items:center;justify-content:space-between;">
                        <label style="display:flex;align-items:center;cursor:pointer;">
                            <input type="checkbox" id="remember-me"
                                style="width:1rem;height:1rem;border:1px solid #d1d5db;border-radius:0.25rem;accent-color:#175013;">
                            <span style="margin-left:0.5rem;font-size:0.875rem;color:#374151;">Recordarme</span>
                        </label>
                        <a href="recoverpassword.html" style="font-size:0.875rem;color:#175013;font-weight:500;transition:color 0.3s;"
                            onmouseover="this.style.color='#175013';"
                            onmouseout="this.style.color='#175013';">¿Olvidaste tu contraseña?</a>
                    </div>


                    <!-- Mensaje de error general -->
                    <div id="login-error"
                        class="hidden bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <span id="login-error-message"></span>
                        </div>
                    </div>

                    <!-- Botón de submit -->
                    <button id="login-btn"
                        style="width:100%;background:linear-gradient(to right,#166534,#016622);color:white;padding:0.75rem 1.5rem;border-radius:0.5rem;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 8px 12px -6px rgba(0,0,0,0.08),0 4px 6px -2px rgba(0,0,0,0.05);"
                        onmouseover="this.style.transform='scale(1.05)'"
                        onmouseout="this.style.transform='scale(1)'"
                    >
                        <svg style="width:1.25rem;height:1.25rem;margin-right:0.5rem;flex-shrink:0;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                        </svg>
                        Iniciar Sesión
                    </button>



                </form>
                <br>

                <!-- Divider -->
                <div class="relative my-1">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-500">O continúa con</span>
                    </div>
                </div>
                <br>

                <!-- Social login (opcional) -->
                <div class="grid grid-cols-2 gap-3">
                    <button
                        class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                        <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Google
                    </button>
                    <button
                        class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                        <svg class="w-5 h-5 mr-2 text-blue-600 " fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                        </svg>
                        Facebook
                    </button>
                </div>

                <!-- Registrarse -->
                <div style="margin-top:1.5rem;text-align:center;">
                    <p style="color:#4b5563;">
                        ¿No tienes cuenta?
                        <a href="register.html" style="color:#175013;font-weight:600;transition:color 0.3s;"
                            onmouseover="this.style.color='#175013';" onmouseout="this.style.color='#175013';">

                    </p>
                </div>
            </div>  
        </div>
    </main>
        <!-- Info adicional -->
        <div class="mt-6 text-center text-sm text-white">
            <p>
                <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                Tus datos están protegidos con encriptación de nivel empresarial
            </p>
        </div>

    <!-- Auth API -->
    <script src="../scripts/auth-api.js"></script>
    <script src="../scripts/session.js"></script>
    <!-- Login Logic -->
    <script>
        console.log('🔐 Inicializando login.html');

        // =============================================
        // VERIFICAR SI YA ESTÁ LOGUEADO
        // =============================================

        if (authAPI.isAuthenticated()) {
            console.log('✅ Usuario ya está logueado, redirigiendo...');
            showAuthNotification('Ya tienes una sesión activa', 'info');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // =============================================
        // TOGGLE PASSWORD VISIBILITY
        // =============================================

        const togglePasswordBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const eyeIconOpen = document.getElementById('eye-icon-open');
        const eyeIconClosed = document.getElementById('eye-icon-closed');

        togglePasswordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIconOpen.classList.add('hidden');
                eyeIconClosed.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIconOpen.classList.remove('hidden');
                eyeIconClosed.classList.add('hidden');
            }
        });

        // =============================================
        // VALIDACIÓN EN TIEMPO REAL
        // =============================================

        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('email-error');

        emailInput.addEventListener('blur', () => {
            const email = emailInput.value.trim();

            if (!email) {
                showFieldError('email', 'El correo es obligatorio');
            } else if (!isValidEmail(email)) {
                showFieldError('email', 'Ingresa un correo válido');
            } else {
                hideFieldError('email');
            }
        });

        passwordInput.addEventListener('blur', () => {
            const password = passwordInput.value;

            if (!password) {
                showFieldError('password', 'La contraseña es obligatoria');
            } else if (password.length < 8) {
                showFieldError('password', 'La contraseña debe tener al menos 8 caracteres');
            } else {
                hideFieldError('password');
            }
        });

        // Limpiar errores al escribir
        emailInput.addEventListener('input', () => {
            if (emailInput.classList.contains('input-error')) {
                hideFieldError('email');
            }
        });

        passwordInput.addEventListener('input', () => {
            if (passwordInput.classList.contains('input-error')) {
                hideFieldError('password');
            }
        });

        // =============================================
        // MANEJO DEL FORMULARIO
        // =============================================

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const loginErrorMessage = document.getElementById('login-error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            console.log('📝 Procesando formulario de login');

            // Limpiar errores previos
            hideAllErrors();

            // Obtener valores
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const rememberMe = document.getElementById('remember-me').checked;

            // Validación básica
            let hasErrors = false;

            if (!email) {
                showFieldError('email', 'El correo es obligatorio');
                hasErrors = true;
            } else if (!isValidEmail(email)) {
                showFieldError('email', 'Ingresa un correo válido');
                hasErrors = true;
            }

            if (!password) {
                showFieldError('password', 'La contraseña es obligatoria');
                hasErrors = true;
            } else if (password.length < 8) {
                showFieldError('password', 'La contraseña debe tener al menos 8 caracteres');
                hasErrors = true;
            }

            if (hasErrors) {
                console.log('❌ Errores en el formulario');
                return;
            }

            // Mostrar loading en el botón
            const originalBtnText = loginBtn.innerHTML;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<svg class="w-5 h-5 inline mr-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Iniciando sesión...';

            try {
                // Llamar a la API
                const result = await authAPI.login(email, password);

                if (result.success) {
                    console.log('✅ Login exitoso');

                    // Mostrar mensaje de éxito
                    showAuthNotification('¡Bienvenido de vuelta!', 'success');

                    // Esperar un momento y redirigir
                    setTimeout(() => {
                        // Redirigir al index o a la página anterior
                        const redirectUrl = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
                        window.location.href = redirectUrl;
                    }, 1500);

                } else {
                    console.error('❌ Error en login:', result.error);

                    // Mostrar error
                    showGeneralError(result.error);

                    // Restaurar botón
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalBtnText;
                }

            } catch (error) {
                console.error('❌ Error inesperado:', error);
                showGeneralError('Error de conexión. Verifica tu conexión a internet.');

                // Restaurar botón
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalBtnText;
            }
        });

        // =============================================
        // FUNCIONES AUXILIARES
        // =============================================

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function showFieldError(field, message) {
            const input = document.getElementById(field);
            const errorElement = document.getElementById(`${field}-error`);

            input.classList.add('input-error', 'border-red-500', 'focus:ring-red-500');
            input.classList.remove('border-gray-300');
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
        }

        function hideFieldError(field) {
            const input = document.getElementById(field);
            const errorElement = document.getElementById(`${field}-error`);

            input.classList.remove('input-error', 'border-red-500', 'focus:ring-red-500');
            input.classList.add('border-gray-300');
            errorElement.classList.add('hidden');
        }

        function showGeneralError(message) {
            loginErrorMessage.textContent = message;
            loginError.classList.remove('hidden');
            loginError.classList.add('animate-shake');

            // Remover animación después de que termine
            setTimeout(() => {
                loginError.classList.remove('animate-shake');
            }, 500);

            // Auto-ocultar después de 5 segundos
            setTimeout(() => {
                loginError.classList.add('hidden');
            }, 5000);
        }

        function hideAllErrors() {
            hideFieldError('email');
            hideFieldError('password');
            loginError.classList.add('hidden');
        }

        // =============================================
        // MOBILE MENU TOGGLE
        // =============================================

        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');

        if (mobileMenuButton && mobileMenu) {
            mobileMenuButton.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        console.log('✅ login.html inicializado correctamente');
    </script>

    <!-- Fallback CSS si Tailwind no carga -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const testElement = document.createElement('div');
            testElement.className = 'bg-blue-500';
            document.body.appendChild(testElement);

            const computedStyle = window.getComputedStyle(testElement);
            if (computedStyle.backgroundColor === 'rgba(0, 0, 0, 0)' || computedStyle.backgroundColor === 'transparent') {
                const script = document.createElement('script');
                script.src = 'https://cdn.tailwindcss.com';
                document.head.appendChild(script);
                console.warn('CSS local no encontrado, usando Tailwind CDN');
            }
            document.body.removeChild(testElement);
        });
    </script>
    </div>
</body>
